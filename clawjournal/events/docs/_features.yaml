# Single source for `events features --json:features` and the
# `events docs commands` topic. Plan 08 §events features.
#
# When 10 ships `events aggregate` and 11 ships `events search`,
# add their entries here and a per-command section to `commands.md`.
version: 1
features:
  - id: events.ingest
    command: clawjournal events ingest
    summary: "Drain pending raw execution events into index.db"
  - id: events.inspect
    command: clawjournal events inspect
    summary: "Inspect a single event, its vendor line, and any override"
  - id: events.capabilities
    command: clawjournal events capabilities
    summary: "Dump the per-client event-type capability matrix"
  - id: events.cost.ingest
    command: clawjournal events cost ingest
    summary: "Extract token usage and detect cost anomalies"
  - id: events.incidents.detect
    command: clawjournal events incidents detect
    summary: "Detect exact-repeat command/tool-call loops (loop detector lite)"
  - id: events.export
    command: clawjournal events export
    summary: "Package a session into a self-describing replay-bundle JSON"
  - id: events.import
    command: clawjournal events import
    summary: "Rehydrate a replay-bundle JSON into local SQLite"
  - id: events.doctor
    command: clawjournal events doctor
    summary: "Diagnose this clawjournal install (versions, schema, ingest health)"
  - id: events.features
    command: clawjournal events features
    summary: "Static product feature surface for AI agents"
  - id: events.docs
    command: clawjournal events docs
    summary: "Topic-based docs corpus (guide / commands / schemas / examples / exit-codes / errors)"
